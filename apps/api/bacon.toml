# Bacon configuration for API development
# Bacon configuration for Rust development

default_job = "run-long"

[jobs.check]
command = ["cargo", "check", "--color", "always"]
need_stdout = false
watch = ["src", "Cargo.toml"]

[jobs.clippy]
command = ["cargo", "clippy", "--color", "always", "--", "-W", "clippy::pedantic"]
need_stdout = false
watch = ["src", "Cargo.toml"]

[jobs.test]
command = ["cargo", "test", "--color", "always"]
need_stdout = true
watch = ["src", "tests", "Cargo.toml"]

[jobs.run]
# Use shell wrapper to tee output to log file while preserving bacon TUI
command = ["sh", "-c", "mkdir -p ../../.meta/logs && cargo run --color always 2>&1 | tee ../../.meta/logs/api.log"]
need_stdout = true
allow_warnings = true
watch = ["src", "Cargo.toml", ".env"]
on_change_strategy = "wait_then_restart"

[jobs.run-long]
# Use shell wrapper to tee output to log file while preserving bacon TUI
command = ["sh", "-c", "mkdir -p ../../.meta/logs && cargo run --color always 2>&1 | tee ../../.meta/logs/api.log"]
need_stdout = true
background = false
allow_warnings = true
watch = ["src", "Cargo.toml", ".env"]
on_change_strategy = "kill_then_restart"
# Long timeout for API server
timeout = 3600

[jobs.build]
command = ["cargo", "build", "--color", "always"]
need_stdout = false
watch = ["src", "Cargo.toml"]

[jobs.build-release]
command = ["cargo", "build", "--release", "--color", "always"]
need_stdout = false
watch = ["src", "Cargo.toml"]

[jobs.doc]
command = ["cargo", "doc", "--color", "always", "--no-deps", "--open"]
need_stdout = false
watch = ["src", "Cargo.toml"]

# Exports for meta integration - centralized in workspace .meta/logs
[exports.meta-locations]
# Export locations in structured format for meta to consume
auto = true
path = "../../.meta/logs/api-locations"
line_format = "{kind}|{path}:{line}:{column}|{message}"

[keybindings]
# Toggle backtrace on/off
b = "job:toggle-backtrace"
# Toggle summary on/off
s = "job:toggle-summary"
# Toggle warnings on/off
w = "job:toggle-warnings"
# Quit bacon
q = "quit"
# Rerun current job
r = "refresh"
# Run check
c = "job:check"
# Run clippy
l = "job:clippy"
# Run tests
t = "job:test"
# Run dev server
d = "job:run-long"
